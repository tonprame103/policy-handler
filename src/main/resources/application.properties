server.port=8080
spring.application.name=json-tool

# ─── Virtual Threads (Project Loom) ──────────────────────────────────────────
# เปิดใช้งาน virtual threads สำหรับ Tomcat + task executors (ต้องใช้ Java 21+)
# ยิ่งใช้ Java 25 ยิ่ง stable และ performant มากขึ้น
spring.threads.virtual.enabled=true

# ─── JSON Files Folder ────────────────────────────────────────────────────────
# Override ได้ผ่าน env variable: JSON_FOLDER=/path/to/folder
# หรือ command line: --json.files.folder=/path/to/folder
json.files.folder=${JSON_FOLDER:./json-samples}

# ─── File Upload Limits ───────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Actuator ─────────────────────────────────────────────────────────────────
# Spring Boot 4: actuator endpoints ต้องระบุ explicitly
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.java.enabled=true
management.info.os.enabled=true

# ─── Info endpoint ────────────────────────────────────────────────────────────
spring.application.version=1.0.0
info.app.name=JSON Tool
info.app.version=${spring.application.version}
info.app.java-version=${java.version}
