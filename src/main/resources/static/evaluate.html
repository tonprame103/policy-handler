<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Tool — Evaluate</title>
<link rel="stylesheet" href="shared.css">
<style>
.split { display: flex; gap: 14px; height: calc(100vh - 52px - 40px); }
.split-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.split-panel .panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.char-counter { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--muted); }

.result-placeholder {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: var(--muted);
  font-family: var(--mono); font-size: 12px; text-align: center;
}
.result-placeholder .icon {
  font-size: 40px; opacity: 0.15;
  font-family: var(--mono); font-weight: 700; color: var(--amber);
}

.result-box { flex: 1; overflow: auto; }
textarea.code-input { flex: 1; }

.path-input-row {
  display: flex; gap: 8px; align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.path-label {
  font-family: var(--sans); font-size: 12px; font-weight: 600; color: var(--text);
  white-space: nowrap;
}
.path-input-row input {
  flex: 1;
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 6px 12px;
  color: var(--text); font-family: var(--mono); font-size: 12px;
  outline: none; transition: border 0.12s;
}
.path-input-row input:focus { border-color: var(--amber); }
.path-input-row input::placeholder { color: var(--muted); }

.list-item-badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
}
.eval-item {
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
}
.eval-item:last-child {
    border-bottom: none;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/jsonpath@1.1.1/jsonpath.min.js"></script>
</head>
<body>

<!-- ── Topbar ── -->
<div class="topbar">
  <a class="topbar-brand" href="index.html">
    <div class="topbar-logo">{}</div>
    <div class="topbar-title">JSON<span>Tool</span></div>
  </a>
  <nav class="nav-links">
    <a class="nav-link" href="index.html">
      <span class="nav-icon">✓</span>
      <span>Validate Json Input</span>
    </a>
    <a class="nav-link" href="files.html">
      <span class="nav-icon">📁</span>
      <span>Validate Json With Files</span>
    </a>
    <a class="nav-link" href="policy.html">
      <span class="nav-icon">🛡</span>
      <span>Policy Management</span>
    </a>
    <a class="nav-link active" href="evaluate.html">
      <span class="nav-icon">🎯</span>
      <span>Evaluate JSON Path</span>
    </a>
  </nav>
  <div class="nav-right">
    <span class="badge-pill badge-blue">Spring Boot 4.0.5</span>
    <span class="badge-pill badge-amber">Java 25</span>
    <span class="badge-pill badge-green"><span class="pulse-dot"></span> frontend only</span>
  </div>
</div>

<!-- ── Content ── -->
<div class="page-content" style="padding: 14px;">
  <div class="split">

    <!-- INPUT -->
    <div class="split-panel">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-label">
            <span style="color:var(--amber)">▶</span> input
          </div>
          <div class="panel-actions">
            <button class="btn" onclick="loadSample()">Sample</button>
            <button class="btn btn-danger btn-ghost" onclick="clearAll()">Clear</button>
            <button class="btn btn-primary" onclick="doEvaluate()">Evaluate ↵</button>
          </div>
        </div>
        
        <div class="path-input-row">
            <div class="path-label">JSON Path</div>
            <input type="text" id="jsonPathInput" placeholder="e.g. $.store.book[*].author" onkeydown="if(event.key==='Enter') doEvaluate()">
        </div>

        <textarea class="code-input" id="jsonInput"
          placeholder="Paste JSON here…&#10;&#10;Ctrl+Enter to evaluate"></textarea>
        <div class="statusbar">
          <span id="inputBadge" class="badge badge-neu">idle</span>
          <span id="charCount" class="char-counter">0 chars</span>
        </div>
      </div>
    </div>

    <!-- OUTPUT -->
    <div class="split-panel">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-label">
            <span style="color:var(--cyan)">◈</span> output
          </div>
          <div class="panel-actions">
            <span id="matchCount" style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-right:10px;"></span>
            <button class="btn" id="copyBtn" style="display:none" onclick="doCopy()">Copy Selected</button>
          </div>
        </div>
        <div id="outputArea" class="result-box">
          <div class="result-placeholder">
            <div class="icon">🎯</div>
            <div>Evaluation results appear here</div>
            <div style="color:var(--border2);font-size:10px;margin-top:4px;">input path + JSON → Evaluate</div>
          </div>
        </div>
        <div class="statusbar">
          <span id="resultBadge" class="badge badge-neu">awaiting input</span>
          <span id="lineCount" class="char-counter"></span>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $in   = document.getElementById('jsonInput');
const $path = document.getElementById('jsonPathInput');
const $out  = document.getElementById('outputArea');
const $rb   = document.getElementById('resultBadge');
const $ib   = document.getElementById('inputBadge');
const $cc   = document.getElementById('charCount');
const $lc   = document.getElementById('lineCount');
const $mc   = document.getElementById('matchCount');
const $cpb  = document.getElementById('copyBtn');
let lastFormatted = '';

$in.addEventListener('input', () => {
  const n = $in.value.length;
  $cc.textContent = n.toLocaleString() + ' chars';
  if (n === 0) setBadge($ib, 'neu', 'idle');
});
$in.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') doEvaluate();
});

function doEvaluate() {
  const jsonStr = $in.value.trim();
  const pathStr = $path.value.trim();
  
  if (!jsonStr) { showToast('⚠ paste JSON first', true); return; }
  if (!pathStr) { showToast('⚠ enter JSON path', true); $path.focus(); return; }
  
  setBadge($ib, 'neu', '');
  $ib.innerHTML = '<span class="spinner"></span>';
  
  setTimeout(() => {
      try {
          // Parse JSON
          let obj;
          try {
              obj = JSON.parse(jsonStr);
              setBadge($ib, 'ok', '✓ parsed');
          } catch(e) {
              $out.innerHTML = errBox('Invalid JSON Input', e.message);
              setBadge($ib, 'err', '✗ invalid json');
              setBadge($rb, 'err', '✗ error');
              $mc.textContent = '';
              $cpb.style.display = 'none';
              return;
          }
          
          // Evaluate Path
          const results = jsonpath.query(obj, pathStr);
          
          if (!results || results.length === 0) {
              $out.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px;">No matches found</div>';
              setBadge($rb, 'neu', '0 matches');
              $mc.textContent = '';
              $cpb.style.display = 'none';
              lastFormatted = '[]';
              return;
          }
          
          // Format Output
          const outputValue = results.length === 1 ? results[0] : results;
          lastFormatted = JSON.stringify(outputValue, null, 2);
          
          $out.innerHTML = `<div style="padding:14px;">${syntaxHL(lastFormatted)}</div>`;
          setBadge($rb, 'ok', '✓ Evaluated');
          $mc.textContent = `${results.length} match${results.length>1?'es':''}`;
          $lc.textContent = lastFormatted.split('\n').length + ' lines';
          $cpb.style.display = 'inline-flex';
          
      } catch (e) {
          $out.innerHTML = errBox('Evaluation Error', e.message);
          setBadge($rb, 'err', '✗ invalid path');
          $mc.textContent = '';
          $cpb.style.display = 'none';
      }
  }, 50);
}

function clearAll() {
  $in.value = ''; $path.value = ''; lastFormatted = '';
  $cc.textContent = '0 chars'; $lc.textContent = ''; $mc.textContent = '';
  $out.innerHTML = `<div class="result-placeholder"><div class="icon">🎯</div><div>Evaluation results appear here</div></div>`;
  setBadge($ib, 'neu', 'idle'); setBadge($rb, 'neu', 'awaiting input');
  $cpb.style.display = 'none';
}

function loadSample() {
  $in.value = JSON.stringify({
    "store": {
      "book": [
        { "category": "reference", "author": "Nigel Rees", "title": "Sayings of the Century", "price": 8.95 },
        { "category": "fiction", "author": "Evelyn Waugh", "title": "Sword of Honour", "price": 12.99 },
        { "category": "fiction", "author": "Herman Melville", "title": "Moby Dick", "isbn": "0-553-21311-3", "price": 8.99 },
        { "category": "fiction", "author": "J. R. R. Tolkien", "title": "The Lord of the Rings", "isbn": "0-395-19395-8", "price": 22.99 }
      ],
      "bicycle": {
        "color": "red",
        "price": 19.95
      }
    }
  }, null, 2);
  $path.value = '$.store.book[*].author';
  $cc.textContent = $in.value.length.toLocaleString() + ' chars';
  setBadge($ib, 'neu', 'sample loaded');
}

function doCopy() {
  if (!lastFormatted) return;
  navigator.clipboard.writeText(lastFormatted).then(() => showToast('✓ Copied JSON Array'));
}

function setBadge(el, type, text) {
  el.className = 'badge badge-' + (type === 'ok' ? 'ok' : type === 'err' ? 'err' : 'neu');
  el.textContent = text;
}

function errBox(msg, detail) {
  return `<div class="err-box"><div>${esc(msg)}</div>${detail ? `<div class="err-detail">${esc(detail)}</div>` : ''}</div>`;
}

function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function syntaxHL(json) {
  return esc(json).replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|[{}\[\],:])/g,
    m => {
      if (/^"/.test(m)) return /:$/.test(m) ? `<span class="j-key">${m}</span>` : `<span class="j-str">${m}</span>`;
      if (/true|false/.test(m)) return `<span class="j-bool">${m}</span>`;
      if (/null/.test(m)) return `<span class="j-null">${m}</span>`;
      if (/[{}\[\]]/.test(m)) return `<span class="j-pun">${m}</span>`;
      if (/,/.test(m)) return `<span class="j-pun">${m}</span>`;
      return `<span class="j-num">${m}</span>`;
    }
  );
}
</script>
</body>
</html>
