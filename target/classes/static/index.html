<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Tool — Validate</title>
<link rel="stylesheet" href="shared.css">
<style>
.split { display: flex; gap: 14px; height: calc(100vh - 52px - 40px); }
.split-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.split-panel .panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.char-counter { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--muted); }

.result-placeholder {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: var(--muted);
  font-family: var(--mono); font-size: 12px; text-align: center;
}
.result-placeholder .icon {
  font-size: 40px; opacity: 0.15;
  font-family: var(--mono); font-weight: 700; color: var(--amber);
}

.result-box { flex: 1; overflow: auto; }
textarea.code-input { flex: 1; }
</style>
</head>
<body>

<!-- ── Topbar ── -->
<div class="topbar">
  <a class="topbar-brand" href="index.html">
    <div class="topbar-logo">{}</div>
    <div class="topbar-title">JSON<span>Tool</span></div>
  </a>
  <nav class="nav-links">
    <a class="nav-link active" href="index.html">
      <span class="nav-icon">✓</span>
      <span>Validate Json Input</span>
    </a>
    <a class="nav-link" href="files.html">
      <span class="nav-icon">📁</span>
      <span>Validate Json With Files</span>
    </a>
    <a class="nav-link" href="policy.html">
      <span class="nav-icon">🛡</span>
      <span>Policy Management</span>
    </a>
  </nav>
  <div class="nav-right">
    <span class="badge-pill badge-blue">Spring Boot 4.0.5</span>
    <span class="badge-pill badge-amber">Java 25</span>
    <span class="badge-pill badge-green"><span class="pulse-dot"></span> running</span>
  </div>
</div>

<!-- ── Content ── -->
<div class="page-content" style="padding: 14px;">
  <div class="split">

    <!-- INPUT -->
    <div class="split-panel">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-label">
            <span style="color:var(--amber)">▶</span> input.json
          </div>
          <div class="panel-actions">
            <button class="btn" onclick="loadSample()">Sample</button>
            <button class="btn btn-danger btn-ghost" onclick="clearAll()">Clear</button>
            <button class="btn btn-primary" onclick="doValidate()">Validate ↵</button>
          </div>
        </div>
        <textarea class="code-input" id="jsonInput"
          placeholder="Paste JSON here…&#10;&#10;Ctrl+Enter to validate"></textarea>
        <div class="statusbar">
          <span id="inputBadge" class="badge badge-neu">idle</span>
          <span id="charCount" class="char-counter">0 chars</span>
        </div>
      </div>
    </div>

    <!-- OUTPUT -->
    <div class="split-panel">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-label">
            <span style="color:var(--cyan)">◈</span> output
          </div>
          <div class="panel-actions">
            <button class="btn" id="copyBtn" style="display:none" onclick="doCopy()">Copy</button>
            <button class="btn" id="minifyBtn" style="display:none" onclick="doMinify()">Minify</button>
          </div>
        </div>
        <div id="outputArea" class="result-box">
          <div class="result-placeholder">
            <div class="icon">{ }</div>
            <div>Formatted JSON appears here</div>
            <div style="color:var(--border2);font-size:10px;margin-top:4px;">paste JSON → Validate</div>
          </div>
        </div>
        <div class="statusbar">
          <span id="resultBadge" class="badge badge-neu">awaiting input</span>
          <span id="lineCount" class="char-counter"></span>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
const $in   = document.getElementById('jsonInput');
const $out  = document.getElementById('outputArea');
const $rb   = document.getElementById('resultBadge');
const $ib   = document.getElementById('inputBadge');
const $cc   = document.getElementById('charCount');
const $lc   = document.getElementById('lineCount');
const $cpb  = document.getElementById('copyBtn');
const $mnb  = document.getElementById('minifyBtn');
let lastFormatted = '', isMinified = false;

$in.addEventListener('input', () => {
  const n = $in.value.length;
  $cc.textContent = n.toLocaleString() + ' chars';
  if (n === 0) setBadge($ib, 'neu', 'idle');
});
$in.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') doValidate();
});

async function doValidate() {
  const json = $in.value.trim();
  if (!json) { showToast('⚠ paste JSON first', true); return; }
  setBadge($ib, 'neu', '');
  $ib.innerHTML = '<span class="spinner"></span>';
  $out.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';
  try {
    const res  = await fetch(API + '/validate', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ json })
    });
    const data = await res.json();
    if (data.valid) {
      lastFormatted = data.formattedJson; isMinified = false;
      $out.innerHTML = syntaxHL(data.formattedJson);
      setBadge($ib, 'ok', '✓ valid');
      setBadge($rb, 'ok', '✓ Valid JSON');
      $lc.textContent = data.lineCount + ' lines';
      $cpb.style.display = $mnb.style.display = 'inline-flex';
      $mnb.textContent = 'Minify';
    } else {
      $out.innerHTML = errBox(data.message, data.errorDetail);
      setBadge($ib, 'err', '✗ invalid');
      setBadge($rb, 'err', '✗ Invalid JSON');
      $lc.textContent = '';
      $cpb.style.display = $mnb.style.display = 'none';
    }
  } catch (e) {
    $out.innerHTML = errBox('Cannot connect to server', e.message);
    setBadge($ib, 'err', '✗ error'); setBadge($rb, 'err', '✗ error');
  }
}

function clearAll() {
  $in.value = ''; lastFormatted = ''; isMinified = false;
  $cc.textContent = '0 chars'; $lc.textContent = '';
  $out.innerHTML = `<div class="result-placeholder"><div class="icon">{ }</div><div>Formatted JSON appears here</div></div>`;
  setBadge($ib, 'neu', 'idle'); setBadge($rb, 'neu', 'awaiting input');
  $cpb.style.display = $mnb.style.display = 'none';
}

function loadSample() {
  $in.value = JSON.stringify({
    application: 'JSON Tool', version: '1.0.0',
    runtime: { springBoot: '4.0.5', java: '25', virtualThreads: true },
    features: ['validate', 'format', 'minify', 'read files'],
    timestamp: new Date().toISOString()
  }, null, 2);
  $cc.textContent = $in.value.length.toLocaleString() + ' chars';
  setBadge($ib, 'neu', 'sample loaded');
}

function doCopy() {
  if (!lastFormatted) return;
  navigator.clipboard.writeText(lastFormatted).then(() => showToast('✓ Copied'));
}

function doMinify() {
  if (!lastFormatted) return;
  if (!isMinified) {
    $out.textContent = JSON.stringify(JSON.parse(lastFormatted));
    $mnb.textContent = 'Format'; isMinified = true;
  } else {
    $out.innerHTML = syntaxHL(lastFormatted);
    $mnb.textContent = 'Minify'; isMinified = false;
  }
}

function setBadge(el, type, text) {
  el.className = 'badge badge-' + (type === 'ok' ? 'ok' : type === 'err' ? 'err' : 'neu');
  el.textContent = text;
}

function errBox(msg, detail) {
  return `<div class="err-box"><div>${esc(msg)}</div>${detail ? `<div class="err-detail">${esc(detail)}</div>` : ''}</div>`;
}

function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function syntaxHL(json) {
  return esc(json).replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|[{}\[\],:])/g,
    m => {
      if (/^"/.test(m)) return /:$/.test(m) ? `<span class="j-key">${m}</span>` : `<span class="j-str">${m}</span>`;
      if (/true|false/.test(m)) return `<span class="j-bool">${m}</span>`;
      if (/null/.test(m)) return `<span class="j-null">${m}</span>`;
      if (/[{}\[\]]/.test(m)) return `<span class="j-pun">${m}</span>`;
      if (/,/.test(m)) return `<span class="j-pun">${m}</span>`;
      return `<span class="j-num">${m}</span>`;
    }
  );
}
</script>
</body>
</html>
